body:
  text: 正一嗣教道合無為闡祖先範眞人領道教事臣張宇初撰進伏聞聖人以神道設教太上以虛無爲宗其廣演宏敷自歷劫以來愈彰愈著原其本也雖有道經師三寳之分而始自太上授道德五千言於關令尹其所謂無爲不爭之㫖始殷三代之初則廣成子蒙黄帝問道於崆峒等而上之道所由立出乎太上一也修諸巳而合夫内聖外王之道者則有關文莊列諸子之遺言治諸世而驗夫清靜無爲之化者則有蓋公曹叅二公之善政迨我祖天師立教於東漢葛仙公許旌陽演派於吳晉曰教則有正一全眞之分曰法則有清微靈寳雷霆之日非究源以求流必忘本以逐末然吾道之盛宋元巳稱特至我朝欽蒙太祖髙皇帝御注道德上下經立成道門上範清理道教崇奬備至謂道教之設中古有之如黃帝謁廣成子於崆峒祖天師錬丹於龍虎役使鬼神禦災捍患所以歴代不磨禱祈有應無不周悉永樂初元首蒙皇上聖恩申明眷諭彌篤務令一遵太祖成憲由是觀之吾道之光赫又豈前之所企及也㢤永樂四年夏伏蒙聖恩委以纂修道典入閣通𩔖切念臣宇初匪材涼德學識淺陋忝竊是懼徒承乏於遺宗曷負勝於重任然雖撫躬慊慄詔命莫辭兩承勑旨之頒時蒙宣室之問揆之駑劣慚悚益増稽之遭遇喜懼交集又念吾道自近代以來玄綱日墜道化莫敷實䘮名存領衰裘委常懐振迪之思莫遂激揚之志兹蓋伏遇聖明御極神睿統天偃武修文成功定難聖德合於天心禎祥疊見皇猷孚於華夏道德斯昌實道門千載一時之遇成太平萬世不湮之典是用旦夕捜采前代定䂓羣師遺則撰成道門十䂓志在激勵流風昭宣聖治永爲奕世繩䂓玄門祖述庶㡬上不負朝廷崇獎之恩下有資道流趨學之逕其茂闡玄元之化益宏清靜之宗隂翊邦祚大振教謨深有望於將來期永䂓於厥後也乎一道教源派始自太上三代之前則黃帝問道廣成子即太上也及曰生於殷末仕於周初在文王時爲柱下史迨武王時遷藏室史其所著則道德上下經其徒則有關文莊列亢倉柏矩之流其言則修齊治平富國强兵經世出世之術互有之矣見之太史氏曰道家者流精神專一言廣易操斯可知矣故所謂先黃老而後六經甚則以黃老倫於刑名則爲過矣其曰元始靈寳乃混沌之初玄元始三氣化生其本則一後之闡化則有祖天師許眞君葛仙翁茅眞君諸仙之派世降之久不究其源各尊派系若祖師之曰正一許君之曰淨明仙公之曰靈寳茅君之曰上清此皆設教之異名其本皆從太上而授凡符籙經教齋品道法之傳雖傳世之久各尊所聞増減去取或有不同而源委則一内而修之則有内外丹之傳其見諸經典者諸子未嘗言之丹砂藥術其曰修錬止性命神氣之說自秦漢以來方士競出若文成五利之以金石草木徒殺身取禍遂世稱方術矣外而施之則有禱禬祠祝之事自㓂杜葛陸之徒其說方盛由後之師匠増損誇誕奔競聲利而世曰異端矣然二者太上之初所未彰顯後之不究其本不探其源者流而忘返眩異失同則去太上立教之本虚無清靜無爲不言之妙日逺矣凡習吾道者必根据經書探索源流務歸於正勿爲邪說淫辭之所汨遂乃逓相鼓惑深失祖風蓋經曰虚無自然道所從出眞一不二體性湛然圎明自足是開立教之源以爲入道之本所宜首務也一道門經籙太上三洞諸品經典乃元始天尊靈寳天尊太上道德天尊金口所宣歷劫相傳諸師闡化若元始說經當以度人上品爲諸經之首靈寳說經當以定觀内觀爲要太上立教當以道德日用爲䂓内而修已則虚皇四十九章經洞古大通生天清靜諸經最爲捷要外而濟世度幽則黃帝隂符經玉樞北斗消災救苦五㕑生神諸經玉樞朝天九幽諸懴是皆入道之梯航修眞之蹊逕是以從道之士先當恭敬神明焚修香火積誦經誥皈依大道首宿今之業垢召福澤之良因故經曰一切神仙眞人皆以無上要言得成道果仙師云經以歛心經以著念使晨夕能焚誦不輟消除魔障増廣道縁誠爲方便中第一事也凡持誦之士必當齋戒身心洗心滌慮存神黙誦誠如對越上帝黙與心神交㑹心念無二句字眞正調聲正氣神暢氣和庶㡬有功則玉音攝氣靈韻交孚自然和天安地善俗化民福集禍消存亡蒙惠苟若口誦心違形留神徃不存誠敬手怠足揚雖日誦千百卷於已何益又豈能消災散禍也哉若爲人持誦猶當持敬存誠以致齋主之敬以通信嚮之誠庶不致虚受齋供布施爲之祈福消愆自然有感如或語言接對嬉笑談諧思念不專熏穢披誦不徒無益於齋主反以貽愆於己身似此皆然深宜䂓戒兼以年代之逺經文訛舛多後代師德之所撰注謬誤不無因生輕慢如或有疑自信不篤則守以一誠愼勿鼓和輕薄浮妄之徒擅生慢毀自貽厥咎其太上諸品經籙若祖天師所受則盟威都功葛仙翁所受則中盟四仙茅眞君所受則上清大洞其餘符籙彌多皆所以福國𥙿民寧家保己是以歷代崇奉皈依者皆獲感應隨所禱叩旋有異徴其太上設教之驗信不誣矣然而代深年逺其或字畫訛謬句讀乖舛有之不得一㮣非議毀訾四方博識師德善加考證詮次申送教門攺正刋行猶爲善果之一助也一坐圜守靜爲入道之本蓋太上立教度人正爲超脫幻化了悟生死若非究竟本來了逹性命則何所謂學道之士也經曰積心善行絶世所欲不興妄想無有染著不滯有無永絶生滅是名眞人近世以禪爲性宗道爲命宗全眞爲性命雙修正一則惟習科教孰知學道之本非性命二事而何雖科教之設亦惟性命之學而已若夫修已利人濟幽度顯非明性命根基曷得功行全備況自上古以來太上歷劫化現諸師之修錬成道皆自靜定之工庶得道功克就神通自在迨宋金之初重陽王祖師遇鍾吕之傳始立全眞之教蓋本經曰養其無體體故全眞是教則猶以坐圜守靜爲要五祖則太上東華鍾吕海蟾也七眞則丘劉譚馬郝孫王也其下綿延暨王苗祈完之輩殆今學之者衆皆以眞功實行爲本其初入道先擇明師叅禮開發性地慤守修眞十戒白祖師馮尊師堂䂓等文收習身心操持節操究竟經典既知入道之門然後擇山水明秀形全氣固之地創立菴舍把茆蓋頭聊蔽風雨風餐露宿水跡雲蹤次結道伴惟務眞素樸實之人晨夕爲侣供送飲食草衣木食簞食瓢飲但獲止飢蔽寒而巳直候百日立基十月胎圎三年圎畢或留圜或出定惟斷絶人事情消縁滅去來自由其或有力之家布施齋糧衣鉢隨分自給而巳不得妄貪過取亦不得假設誇誕之辭驚世駭俗務吊虚名其補破遮寒乞食化衣眞功苦行槁木死灰乃磨勵身心分内之事庶不負四恩殃及九祖苟或退怠則羣魔作障矣其供圜道伴竭力扶持寒暑疾厄務盡勤勞亦積巳之功成人之善也不得假以禪宗棒喝互爭人我取世非議所究丹經惟石壁記龍虎經叅同契悟眞篇翠虚篇還源篇指玄篇大道歌崔公入藥鏡金丹四百字并諸仙語録皆誘人修眞入聖之梯航所宜潜心研究庶無差慝其旁門左道之言不許經目留心悮巳惑人甚則毀謗經典借證其非則貽冥譴必矣一齋法行持乃上古籲天祭之禮自靈寳天尊受元始說經以來爲立教之本其目最多其文最浩然自太極徐眞人仙翁葛眞人朱陽鄭眞人三師而下則杜葛陸寗項㓂又其最名世者由是而分則有林田金白諸師遂有東華南昌之分派雖不同而其源則一故符篆呪訣亦相去不逺是皆後之師德各立宗門接引後來之一端初無二道也舍此數派稱爲正宗餘不足師者多矣世傳三籙内文金書玉鑑道門定制立成儀等書巳有定䂓凡行持之士必廣叅博究務明性命根宗累積眞功實行凡遇行持必須齋明盛服潔已清心先錬諸已後可度䰟必齋戒以通神明外絶塵務内錬形神非符籙簡札之事不得妄與凡陞壇朝叩之次務積一誠精思黙存爲衆所模範庶上可以感天地鬼神下則不負幽冥之苦趣如三籙之設金籙惟帝王可建玉籙惟后妃可建黃籙則士庶可建大小各依分數不可僣亂定䂓一遵太祖皇帝立成儀範恪守爲則凡其符籙簡札之𩔖亦不得増損移易其壇儀科典皆設像隂陽取則經緯一無妄建苟不以誠敬齋莊爲本惟務鍾鼓喧譁旙花眩彩語言嬉笑舉動輕浮何以對越上帝通誠三界不惟無以感召休祥亦且反増罪業矣傳曰鬼神無常享享於克誠誠則有神其理甚著故澗溪沼沚之毛蘋蘩藴藻之菜皆可羞之鬼神薦之上帝也此所以爲髙功錬師者必擇同道端潔諳通之士同壇共事庶無貽咎於巳亦爲齋主消愆而致福其所用雲樂之外其餘鐃鈸鈴鐸之𩔖不得雜用甚爲䙝瀆至若趙歸眞林靈素之徒偶爲世主之所崇尚敬禮即爲富貴所驕有失君臣之分過設誇誕之辭不以慈儉自守亦取議當時後世多矣是切爲後戒一道法傳緒清微始於元始天尊神霄始於玉清眞王自歷代傳緒以來清微自魏祖二師而下則有朱李南黃諸師傳衍猶盛凡符章經道齋法雷法之文率多黃師所衍神霄自汪王二師而下則有張李白薩潘楊唐莫諸師恢弘猶至凡天雷酆嶽之文各相師授或一將而數派不同或一派而符呪亦異以是訛舛失眞隱眞出僞者多因而互生謗惑凡行持之士必有戒行爲先次以叅究爲務先求巖谷明師草衣木食之士開發萬法根宗精勵香火止佩一法一籙一職苟能晨夕錬神養氣修持不怠與神明交格言行無慊何患法之不靈將之不祐雖職小法專亦驗苟惟務虚名奔逐聲利必求叅當世顯逹爲師誇名眩世不修香火荒怠修持佩法縱多徒若商賈之負販籙職貴於髙大出處務於誇眩耽肆酒食矜伐怨欲不異井巷巫覡之徒未甞留念神明輙誇符呪之驗呼儔誘𩔖第相鼓惑甚則假以謝師犒將徼索酒食誠有悮於叩析且深乖於教範又輙妄爲人師以盲引瞽内無功行外結是非深爲大戒果爲髙行之士惟務致虚守靜一念不生萬縁俱寂性天道法心地雷霆不落萬縁之窩曰惟究向上之眞宗斯爲上士也又等圎光附體降將附箕扶鸞照水諸項邪說行持正法之士所不宜道亦不得蔽惑邪言誘衆害道凡行符水之士務以利濟存心以丹砂藥術兼濟不得妄受資財反與鬼神構怨以至法術不驗亦不得濫授道法輕泄玄機雖入道之人崇教之士言行不莊慢忽香火者亦宜寳祕愼勿妄傳而況市井屠釣之徒苟利眩名輙納爲徒浮談誑語自貽律譴罪所不原一住持領䄂凡名山福地靖廬治化叢林宫觀住持之士或甲乙徃還或本山推舉必得髙年耆德剛方正直之士言行端莊問學明博足爲叢林之師表福地之依皈者爲之庶足儀刑後進凖則前修其居是者務必慈仁儉約德量含弘䂓矩公正先開接引之方導愚畜衆次謹焚修之職請福消愆𥙿國祝釐莫大於報本尊經闡教莫大於推誠其畜衆之方先嚴戒行䂓矩爲要警以罪福因果之報田糧委庫職管紹賦稅任砧基應充飲食修造各謹司存晨昏以神明爲謹修葺爲心五湖四海髙人羽士或挂搭安單栖冬結夏設知堂一貟廣於接待素食粗衣隨縁安駐務令身口安閑逍遥無念庶進道有基身心無慮其刻苦修持者猶當周給其入山擅施喜捨隨縁或建齋設醮薦祖度親隨力行持一遵齋科大小濟利母校所施厚薄經曰一切諸福皆自歡喜中來一切布施生歡喜心種種善果福報無邊其官貴賔客徃還素麫一飡遇夜則宿不得干與公事延留惹非朔望宣明訓戒開示激揚務修本面家風究竟本宗事業毋貪富貴毋嗜喧囂因而爭相倣效華衣美食廣厦細氈昧公營私出入騎乗呵擁僕御交接權勢以致教化不行源汙流濁甚則耽迷聲色外飾内乖不畏香火神明靈壇古跡私畜俗眷穢䙝神祇所轄住持宜聞於有司處決下山不得蒙昧阿私有壞䂓法其後進不遵輕薄之流不習本宗惟圖頑横自貽過咎必宜依律遣斷庶獲䂓繩嚴肅教範宣揚如或一㮣容情罪宜均受近者郡邑道寮儀範猶乖紀綱不振所合整肅一守定䂓一雲水叅訪凡出家之人上離父母之親下棄祖宗之嗣志在出世離塵必當以超脫幻化了悟生死爲心苟若仍前汨迷塵網晝夜奔波無有出期與俗何異經曰學道之士以清靜爲本覩諸邪道如覩仇讎逺諸愛慾如避臭穢除苦惱根斷親愛縁是故出家之後離情割愛舍妄歸眞必當以究明心地修養性天爲務操修戒行磨錬身心隻笠簞瓢孤雲野鶴或遇名山洞府挂搭安單叅謁明眼師匠問道親師切究性命根宗深探道德之要悟徹宗門玩味法乳不於利名挂意富貴留心雖飢寒風暑之切身不易其操雖困苦貧賤之役心不奪其志忍辱藏垢言行謙和卑下柔弱精神純一心存柔遜性戒剛强務居山林巖洞人跡稀絶之地草衣木食以養生巢居穴處以守道各依師授修錬本來其出外叅求風飡雨宿忍凍受飢躡屩擔簦携包頂鉢不懼萬里之遥務登名師大匠之門一言之下頓悟萬劫之果遂周致凡出處之間悉遵白祖師馮尊師諸師匠堂䂓叢林儀範而行凡有過失悉依責罰其或非實際悟明眞積力久性天瑩徹塵垢磋磨好爲人師以自大者必擇而師之不得惟慕虚名趨媚顯逹貪迷聲利不究實地工夫至乃前工盡廢業障徒存其雲朋霞友之徒亦須志合道同方乃不生魔識共成道願先擇後交猶爲自戒苟或師友得人堅心苦行普資羣品度脫幽沈則臣事三境超神八極爲不難矣一立觀度人爲出家接續之首務凡名山洞府洞天福地古跡靈壇皆古昔仙眞靈跡去處其欲香火綿逺必以度人爲先須擇名器之家資性淳良庶可訓誨苟非道材法器汎濫收録或不成材肆暴爲非罔守戒訓不惟貽玷玄門又且成敗興廢所繫或多來歷汙雜出處卑微甚則累辱冠裳尤宜自愼必得其人然後聽言觀行察審詳實爲其登名臘籍長幼各依齒叙不得徇私紊亂書記㑹衆舉試道門經典務要習熟諳通掌籍𩔖名申送道司俟度牒開通依例申名朝廷關給方可簮披爲道士既頂冠裳之後掌籍常加鈐束房長晨夕訓戒務守清䂓恭敬神明焚誦經誥凡係本宗科典經書齋醮道法詞意榜語必當貫熟該通潜心究竟出處語黙修習爲常行有餘力若儒之性理釋之禪宗更能融通一貫猶爲上士暇日則舉唱法事焚香揮麈論道叅眞或吟詩撫琴以自怡或佩法坐圜以自究或有應縁經醮務必齋戒存誠一遵前訓藜羮糲食楮被布衣乃出家常事不得溷同世俗故違䂓矩博奕肆酒交友奸邪長幼參商支分派别考試不中舉唱不齊視科典爲文具因果爲虚談歌談妖豔之詞汨没利名之域貪迷富貴耽戀紛華不究本面家風日墜祖宗基業輕則議罰容以自悛重則一遵戒條下山除籍庶激勵於將來使四方之遵守一金榖田糧多累朝給賜田土或前代師德所置祖産前後檀越所施專爲贍衆香燈之用其常住庫堂設職管紹出納其各寮院宜遵常住定䂓長幼輪次管紹其租課金榖簿書庫堂則都監上座監臨掌之寮院則房長掌之以下者止依臘叙長幼輪管凡一歲賦稅科差殿堂修造房院修葺春秋祭祀時序薦誦吉凶弔賀關防火盜必以贍衆爲先悠久爲志務要公同出納明白登載不得指私爲公各畜私財互分各據擅自支遣務令老安幼懷香燈不乏報祀以時修葺勤謹賦稅預備則上下雍睦香火悠久公私無窘逼之憂宫觀無興替之患疾病互相扶持死亡務從儉約薦送俱不得昧公營私虧瞞入己苟求衣食欺誑神明租課湮没修造不舉祭祀荒違以致科差㸃充上下靡寧甚則攘竊非爲有乖教法不懼天理之誅有負檀施之願在公庫則衆職舉行方丈㑹衆查理議罰計其輕重甚則更替輕則罰倍其數入庫公用其寮院則尊長舉行亦㑹衆眷查理輕重亦照常住行之申呈方丈從公遣逐如衆職互相容蔽以掩己私尊長姑息不言暗相護恃隣眷亦宜舉行公議以明去就懲一戒百其常住田土例不許賣亦不得私立契約破蕩賣易其應充科役宜遵定制設砧基道人支應庶不一㮣汙雜染習澆風切須自愼神鑒孔昭各宜勉之一宫觀修葺凡名山福地眞靈香火之所多宋元本朝所䢖宫宇上以祝釐福國下以容衆安單毎因兵燹之餘遂乃廢弛不舉其各宫觀若殿宇法堂齋堂官舍雲堂道舘兩廡庖𢈔所不可無雖户有田糧或所任非人沈匿租課入巳肆非妄爲毀滅神像傾頽屋舍者多務以科差藉口甚則典賣常住器皿房屋卒爲瓦礫榛蕪終身不思芟整者有之或各有私財分煙異爨因而倣習成風昨蒙聖恩清理其凡係前代眞仙古跡靈壇豈宜廢弛必合依時修葺或户下田糧荒熟不等賦稅輕重又或産去稅存不時各須臨田查理開報有司立碑刻石毋致湮滅與公庫職貟公同出納務以修葺贍衆爲先專設直歲一貟知庫一貟毎歲修補漏爛整築墻籬潔淨道路肅清壇宇蓄箓山林使神明有所依栖四衆亦獲安逸如田糧所用不敷或資於經醮或藉於題注衆力經營隨宜整葺亦不得假此名色在外交結官貴誘透商賈强人謀爲非出善願因而招惹是非返爲宫觀之累如或田糧香花可充修造肥已不爲故行穿鑿山林有傷風水赭伐林木以充口腹同處職眷逓相覺察聞於道司舉行定奪如悛過自新方許同處其或頑愎不遵聽自有司區處務在革替一新常川修葺庶無傾廢永振前䂓凡在玄門各宜遵守道門十䂓
